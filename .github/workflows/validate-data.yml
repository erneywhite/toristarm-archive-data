name: Validate data

# Запускается только при изменении данных игр/фильмов или самого валидатора —
# регулярные коммиты бота в stream_status.json НЕ триггерят проверку.
on:
  push:
    paths:
      - 'data/games.json'
      - 'data/movies.json'
      - 'tools/validate-data.mjs'
      - '.github/workflows/validate-data.yml'
  pull_request:
    paths:
      - 'data/games.json'
      - 'data/movies.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Проверка структуры данных и жанров
        run: node tools/validate-data.mjs
